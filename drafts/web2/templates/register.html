<!-- templates/register.html -->
{% extends "base.html" %}

{% block title %}AI ВУЗ - Регистрация{% endblock %}

{% block content %}
<div class="container">
    <div class="auth-container">
        <div class="auth-card">
            <h2 class="auth-title">Регистрация</h2>

            <form method="POST" action="{{ url_for('register') }}">
                <div class="mb-4">
                    <label class="ai-form-label">Имя пользователя</label>
                    <input type="text" name="username" class="ai-form-control w-100" required
                           placeholder="Введите имя пользователя">
                </div>

                <div class="mb-4">
                    <label class="ai-form-label">Email</label>
                    <input type="email" name="email" class="ai-form-control w-100" required
                           placeholder="Введите email">
                </div>

                <div class="mb-4">
                    <label class="ai-form-label">Пароль</label>
                    <input type="password" name="password" class="ai-form-control w-100" required
                           placeholder="Введите пароль">
                </div>

                <div class="mb-4">
                    <label class="ai-form-label">Подтверждение пароля</label>
                    <input type="password" name="confirm_password" class="ai-form-control w-100" required
                           placeholder="Повторите пароль">
                </div>

                <div class="mb-4 form-check">
                    <input type="checkbox" class="form-check-input" id="agree" required>
                    <label class="form-check-label text-secondary" for="agree">
                        Я согласен с правилами обработки данных
                    </label>
                </div>

                <button type="submit" class="btn-ai-primary w-100 mb-3">
                    Зарегистрироваться
                </button>

                <div class="text-center">
                    <a href="{{ url_for('login') }}" class="text-ai-cyan text-decoration-none">
                        Уже есть аккаунт? Войти
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
